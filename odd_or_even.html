<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odd or Even</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --surface2: #1c1c2a;
    --border: rgba(255,255,255,0.07);
    --accent: #c8f04a;
    --accent2: #ff5e5e;
    --text: #f0f0f8;
    --muted: #6b6b88;
    --win-glow: 0 0 40px rgba(200,240,74,0.3);
    --lose-glow: 0 0 40px rgba(255,94,94,0.3);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(200,240,74,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255,94,94,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 540px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.5rem, 8vw, 4rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent) 0%, #8fff6e 50%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    margin-top: 0.4rem;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* AI Brain bar */
  .brain-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .brain-icon {
    font-size: 1.4rem;
    flex-shrink: 0;
    transition: transform 0.3s;
  }
  .brain-info { flex: 1; }
  .brain-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  .brain-label span { color: var(--accent); font-weight: 500; }
  .brain-track {
    height: 5px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }
  .brain-fill {
    height: 100%;
    background: linear-gradient(90deg, #8fff6e, var(--accent));
    border-radius: 99px;
    width: 0%;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }

  /* Scoreboard */
  .scoreboard {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
    align-items: center;
  }
  .score-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
  }
  .score-who {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .score-num {
    font-family: 'Syne', sans-serif;
    font-size: 2.2rem;
    font-weight: 800;
    transition: transform 0.2s, color 0.2s;
  }
  #player-score { color: var(--accent); }
  #ai-score { color: var(--accent2); }
  .round-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem 0.75rem;
    text-align: center;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    line-height: 1.6;
  }
  .round-badge strong {
    display: block;
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0;
  }

  /* Game card */
  .game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
    transition: box-shadow 0.4s;
  }
  .game-card.flash-win { box-shadow: var(--win-glow); }
  .game-card.flash-lose { box-shadow: var(--lose-glow); }

  .section-label {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }

  /* Parity toggle */
  .parity-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .parity-btn {
    padding: 0.9rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface2);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .parity-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }
  .parity-btn.active-odd {
    background: rgba(200,240,74,0.1);
    border-color: var(--accent);
    color: var(--accent);
  }
  .parity-btn.active-even {
    background: rgba(255,94,94,0.1);
    border-color: var(--accent2);
    color: var(--accent2);
  }

  /* Fingers slider */
  .fingers-area { margin-bottom: 1.5rem; }
  .fingers-display {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.5rem;
  }
  .fingers-num {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    color: var(--text);
  }
  .fingers-hands {
    font-size: 1.5rem;
    letter-spacing: -4px;
    transition: all 0.2s;
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 5px;
    background: var(--surface2);
    border-radius: 99px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--text);
    border: 3px solid var(--bg);
    box-shadow: 0 0 0 1px var(--muted);
    transition: transform 0.1s;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
  input[type=range]::-moz-range-thumb {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--text); border: 3px solid var(--bg);
    box-shadow: 0 0 0 1px var(--muted); cursor: pointer;
  }

  /* Play button */
  .play-btn {
    width: 100%;
    padding: 1rem;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .play-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(200,240,74,0.3); }
  .play-btn:active:not(:disabled) { transform: scale(0.98); }
  .play-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Result panel */
  .result-panel {
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.1rem 1.25rem;
    display: none;
    margin-top: 1rem;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .result-panel.win { border-color: rgba(200,240,74,0.4); background: rgba(200,240,74,0.06); }
  .result-panel.lose { border-color: rgba(255,94,94,0.4); background: rgba(255,94,94,0.06); }
  .result-panel.tie { border-color: var(--border); background: var(--surface2); }
  .result-headline {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .result-panel.win .result-headline { color: var(--accent); }
  .result-panel.lose .result-headline { color: var(--accent2); }
  .result-panel.tie .result-headline { color: var(--text); }
  .result-detail { font-size: 0.72rem; color: var(--muted); line-height: 1.7; }
  .result-detail strong { color: var(--text); }

  /* Arena: shows both hands */
  .arena {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    background: var(--surface2);
    border-radius: 10px;
    padding: 0.9rem 1.25rem;
    margin-top: 0.75rem;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .arena-player, .arena-ai { text-align: center; flex: 1; }
  .arena-fingers { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 2px; }
  .arena-player .arena-fingers { color: var(--accent); }
  .arena-ai .arena-fingers { color: var(--accent2); }
  .arena-vs { font-family: 'Syne', sans-serif; font-size: 0.7rem; font-weight: 700; color: var(--muted); }
  .arena-total {
    text-align: center;
    margin-top: 0.5rem;
    font-size: 0.7rem;
    color: var(--muted);
  }
  .arena-total strong { color: var(--text); }

  /* History log */
  .log-section { margin-top: 0; }
  .log-label {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }
  .log-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 130px;
    overflow-y: auto;
  }
  .log-list::-webkit-scrollbar { width: 3px; }
  .log-list::-webkit-scrollbar-track { background: transparent; }
  .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  .log-entry {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.65rem;
    color: var(--muted);
    padding: 4px 8px;
    border-radius: 6px;
    background: var(--surface2);
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .log-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }
  .log-dot.win { background: var(--accent); }
  .log-dot.lose { background: var(--accent2); }
  .log-dot.tie { background: var(--muted); }
  .log-entry span { flex: 1; }
  .log-round { margin-left: auto; opacity: 0.5; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">ODD OR EVEN</div>
    <div class="subtitle">You call odd or even — AI takes the other. Total decides.</div>
  </div>

  <!-- AI Brain -->
  <div class="brain-bar">
    <div class="brain-icon" id="brain-icon">🧠</div>
    <div class="brain-info">
      <div class="brain-label">AI Intelligence <span id="brain-pct">0%</span></div>
      <div class="brain-track"><div class="brain-fill" id="brain-fill"></div></div>
    </div>
    <div style="font-size:0.65rem; color:var(--muted); text-align:right; line-height:1.5;" id="brain-status">Random<br>guessing</div>
  </div>

  <!-- Scores -->
  <div class="scoreboard">
    <div class="score-block">
      <div class="score-who">You</div>
      <div class="score-num" id="player-score">0</div>
    </div>
    <div class="round-badge">Round<strong id="round-num">1</strong></div>
    <div class="score-block">
      <div class="score-who">AI</div>
      <div class="score-num" id="ai-score">0</div>
    </div>
  </div>

  <!-- Game -->
  <div class="game-card" id="game-card">
    <div class="section-label">1 — Call it (AI takes the opposite)</div>
    <div class="parity-toggle">
      <button class="parity-btn" id="btn-odd" onclick="selectParity('odd')">Odd</button>
      <button class="parity-btn" id="btn-even" onclick="selectParity('even')">Even</button>
    </div>

    <div class="fingers-area">
      <div class="section-label">2 — Show fingers (0–5)</div>
      <div class="fingers-display">
        <div>
          <div class="fingers-num" id="fingers-num">2</div>
        </div>
        <div class="fingers-hands" id="fingers-hands">✌️</div>
      </div>
      <input type="range" id="slider" min="0" max="5" step="1" value="2" oninput="updateFingers(this.value)">
    </div>

    <button class="play-btn" id="play-btn" onclick="playRound()" disabled>Choose odd or even first</button>

    <div class="result-panel" id="result-panel">
      <div class="result-headline" id="result-headline"></div>
      <div class="result-detail" id="result-detail"></div>
      <div class="arena" id="arena">
        <div class="arena-player">
          <div class="arena-fingers" id="arena-player-f">—</div>
          <div>you</div>
        </div>
        <div class="arena-vs">VS</div>
        <div class="arena-ai">
          <div class="arena-fingers" id="arena-ai-f">—</div>
          <div>ai</div>
        </div>
      </div>
      <div class="arena-total" id="arena-total"></div>
    </div>
  </div>

  <!-- Log -->
  <div class="log-section" id="log-section" style="display:none;">
    <div class="log-label">Match history</div>
    <div class="log-list" id="log-list"></div>
  </div>
</div>

<script>
const handEmojis = ['🤜','☝️','✌️','🤟','🖖','🖐️'];

const state = {
  playerScore: 0,
  aiScore: 0,
  round: 1,
  parity: null,
  history: [],
  mem: { fingers: {}, parity: {}, transitions: {}, parityGivenFingers: {} }
};

function updateFingers(v) {
  document.getElementById('fingers-num').textContent = v;
  document.getElementById('fingers-hands').textContent = handEmojis[parseInt(v)];
}

function selectParity(p) {
  state.parity = p;
  const o = document.getElementById('btn-odd');
  const e = document.getElementById('btn-even');
  o.className = 'parity-btn' + (p === 'odd' ? ' active-odd' : '');
  e.className = 'parity-btn' + (p === 'even' ? ' active-even' : '');
  const btn = document.getElementById('play-btn');
  btn.disabled = false;
  btn.textContent = 'Play →';
}

function aiPredict(playerParity) {
  const mem = state.mem;
  const rounds = state.history.length;
  const level = Math.min(rounds / 12, 1);
  const aiParity = aiOppositeParity(playerParity);

  // Predict what fingers player will show
  let predictedPlayerFingers = null;

  if (rounds >= 3 && Math.random() < level * 0.9) {
    // Transition prediction
    const last = state.history[rounds - 1];
    const key = last.pp + '_' + last.pf;
    const trans = mem.transitions[key] || {};
    const total = Object.values(trans).reduce((a, b) => a + b, 0);
    if (total >= 2) {
      const best = Object.entries(trans).sort((a, b) => b[1] - a[1])[0];
      if (best[1] / total > 0.35) predictedPlayerFingers = parseInt(best[0]);
    }
  }

  if (predictedPlayerFingers === null && rounds >= 3 && Math.random() < level * 0.8) {
    const freq = mem.fingers;
    const total = Object.values(freq).reduce((a, b) => a + b, 0);
    if (total >= 3) {
      const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]);
      predictedPlayerFingers = parseInt(sorted[0][0]);
    }
  }

  if (predictedPlayerFingers !== null) {
    // AI wants: (predictedPlayerFingers + aiFingers) % 2 === (aiParity === 'odd' ? 1 : 0)
    const targetParity = aiParity === 'odd' ? 1 : 0;
    const needed = ((targetParity - (predictedPlayerFingers % 2)) + 2) % 2;
    // Pick a finger count with the right parity — prefer mid-range to stay unpredictable
    const candidates = [0,1,2,3,4,5].filter(f => f % 2 === needed);
    return candidates[Math.floor(Math.random() * candidates.length)];
  }

  return Math.floor(Math.random() * 6);
}

// AI always takes opposite parity — no choice needed here
function aiOppositeParity(playerParity) {
  return playerParity === 'odd' ? 'even' : 'odd';
}

function updateMemory(pf, pp, prevEntry) {
  const mem = state.mem;
  mem.fingers[pf] = (mem.fingers[pf] || 0) + 1;
  if (prevEntry) {
    const key = prevEntry.pp + '_' + prevEntry.pf;
    if (!mem.transitions[key]) mem.transitions[key] = {};
    mem.transitions[key][pf] = (mem.transitions[key][pf] || 0) + 1;
  }
}

function updateBrain() {
  const r = state.history.length;
  const lvl = Math.min(r / 12, 1);
  const pct = Math.round(lvl * 100);
  document.getElementById('brain-fill').style.width = pct + '%';
  document.getElementById('brain-pct').textContent = pct + '%';
  const statuses = [
    [0, 'Random\nguessing'],
    [20, 'Noticing\npatterns'],
    [40, 'Learning\nyou'],
    [60, 'Adapting\nstrategy'],
    [80, 'Sharp\nreadings'],
    [95, 'Near\nmastered']
  ];
  const s = statuses.filter(x => x[0] <= pct).pop();
  document.getElementById('brain-status').innerHTML = s[1].replace('\n', '<br>');
  if (pct > 50) document.getElementById('brain-icon').textContent = '🤖';
  if (pct > 80) document.getElementById('brain-icon').textContent = '🧬';
}

function bump(el) {
  el.style.transform = 'scale(1.3)';
  setTimeout(() => { el.style.transform = ''; }, 200);
}

function playRound() {
  if (!state.parity) return;

  const pf = parseInt(document.getElementById('slider').value);
  const pp = state.parity;
  const prevEntry = state.history.length > 0 ? state.history[state.history.length - 1] : null;

  const aip = aiOppositeParity(pp);
  const aif = aiPredict(pp);

  const total = pf + aif;
  const actual = total % 2 === 0 ? 'even' : 'odd';

  // Exactly one winner always (opposite calls)
  const playerWin = pp === actual;
  const aiWin = aip === actual;

  updateMemory(pf, pp, prevEntry);
  state.history.push({ pf, pp, aif, aip, playerWin, aiWin });

  if (playerWin) state.playerScore++;
  else state.aiScore++;

  document.getElementById('player-score').textContent = state.playerScore;
  document.getElementById('ai-score').textContent = state.aiScore;
  bump(document.getElementById('player-score'));
  bump(document.getElementById('ai-score'));

  state.round++;
  document.getElementById('round-num').textContent = state.round;
  updateBrain();

  const panel = document.getElementById('result-panel');
  const headline = document.getElementById('result-headline');
  const detail = document.getElementById('result-detail');

  panel.style.display = 'block';

  let cls, head, msg;
  if (playerWin) {
    cls = 'win'; head = '✦ You win this round';
    msg = `Total was <strong>${total}</strong> — that's <strong>${actual}</strong>. You called ${pp}, AI called ${aip}.`;
  } else {
    cls = 'lose'; head = 'AI wins this round';
    msg = `Total was <strong>${total}</strong> — that's <strong>${actual}</strong>. AI called ${aip}, you called ${pp}.`;
  }

  panel.className = 'result-panel ' + cls;
  headline.textContent = head;
  detail.innerHTML = msg;

  document.getElementById('arena-player-f').textContent = pf;
  document.getElementById('arena-ai-f').textContent = aif;
  document.getElementById('arena-total').innerHTML = `${pf} + ${aif} = <strong>${total}</strong> (${actual})`;

  const card = document.getElementById('game-card');
  card.classList.remove('flash-win', 'flash-lose');
  void card.offsetWidth;
  card.classList.add(cls === 'win' ? 'flash-win' : 'flash-lose');

  const logSection = document.getElementById('log-section');
  const logList = document.getElementById('log-list');
  logSection.style.display = 'block';
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  const dot = document.createElement('div');
  dot.className = 'log-dot ' + cls;
  const txt = document.createElement('span');
  txt.textContent = `You: ${pf} (${pp}) | AI: ${aif} (${aip}) | ${total} = ${actual}`;
  const rnd = document.createElement('div');
  rnd.className = 'log-round';
  rnd.textContent = '#' + (state.round - 1);
  entry.append(dot, txt, rnd);
  logList.prepend(entry);

  state.parity = null;
  document.getElementById('btn-odd').className = 'parity-btn';
  document.getElementById('btn-even').className = 'parity-btn';
  document.getElementById('play-btn').disabled = true;
  document.getElementById('play-btn').textContent = 'Choose odd or even first';
}
</script>
</body>
</html>
